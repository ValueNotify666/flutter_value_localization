name: flutter_value_localization_example
description: Example app for flutter_value_localization
publish_to: 'none'
version: 1.0.0

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_value_localization:
    path: ..

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - langFiles/app_en.json
    - langFiles/app_zh.json
    - langFiles/app_zh_cn.json
